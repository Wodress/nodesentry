services:
  nodesentry:
    build: .
    image: nodesentry:local
    command:
      - audit
      - --rpc-url
      - ${BITCOIN_RPC_URL:-http://127.0.0.1:8332}
      - --data-dir
      - /disk-probe
      - --cookie-file
      - /run/secrets/bitcoin-rpc-cookie
    volumes:
      - ${BITCOIN_CREDENTIAL_FILE:?set BITCOIN_CREDENTIAL_FILE}:/run/secrets/bitcoin-rpc-cookie:ro
      - ${BITCOIN_DISK_PROBE_PATH:?set BITCOIN_DISK_PROBE_PATH}:/disk-probe:ro
    read_only: true
    tmpfs:
      - /tmp:size=16m,noexec,nosuid,nodev
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    network_mode: host
    restart: "no"
