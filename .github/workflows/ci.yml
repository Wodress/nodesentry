name: CI
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python }}
      - run: uv sync --extra dev
      - run: uv run pytest --cov=nodesentry --cov-report=term-missing
      - run: uv run ruff check .
      - run: uv build
  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t nodesentry:ci .
      - run: docker run --rm --entrypoint nodesentry nodesentry:ci --version
